name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  build-test:
    name: Build & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - run: go build ./...
      - run: go vet ./...
      - run: go test ./...

  # WS49 — vulnerability gate (osv-scanner). BLOCKING.
  #
  # The go directive is on 1.26.4 (WS51 catch-up upgrade cleared GO-2026-5037 /
  # GO-2026-5039), so the scan is clean and this job gates merges: a new advisory
  # against any dependency fails CI until it is upgraded or explicitly deferred
  # via an audited entry in osv-scanner.toml.
  osv-scan:
    name: Vulnerability scan (osv-scanner)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: Run osv-scanner (pinned; local parity with `make vuln-scan`)
        run: make vuln-scan

  # WS50 — non-blocking dependency-freshness report. Surfaces drift on every PR
  # without flaking the build; enforcement stays with review + catch-up upgrades.
  deps-report:
    name: Dependency freshness (report-only)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: Report outdated direct deps
        run: |
          {
            echo '### Outdated direct dependencies'
            echo '```'
            make deps-outdated || true
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

  # Aggregate required check. osv-scan gates merges now that the tree is clean
  # (WS51); deps-report stays advisory and is intentionally excluded.
  all-checks:
    name: All checks passed
    runs-on: ubuntu-latest
    needs: [build-test, osv-scan]
    if: always()
    steps:
      - name: Verify required jobs succeeded
        run: |
          if [ "${{ needs.build-test.result }}" != "success" ]; then
            echo "build-test did not succeed"
            exit 1
          fi
          if [ "${{ needs.osv-scan.result }}" != "success" ]; then
            echo "osv-scan did not succeed"
            exit 1
          fi
