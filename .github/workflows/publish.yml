name: Publish Adapter

# Build the Go adapter binary, then publish it as a signed OCI artifact via the
# reusable brokenbots/publish-adapter action.

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (without leading v)'
        required: false
        default: '0.0.0-dev'

permissions:
  contents: read
  packages: write
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.3

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      # Pure-Go adapter: cross-compile every supported platform from this one
      # linux runner into artifact/bin/<os>/<arch>/. `criteria adapter publish`
      # scans the bin/ tree under the directory it is given (artifact/) and
      # packages all platforms into a single multi-platform OCI artifact.
      - name: Cross-build adapter binaries
        run: |
          set -euo pipefail
          for platform in linux/amd64 linux/arm64 darwin/amd64 darwin/arm64; do
            os="${platform%/*}"; arch="${platform#*/}"
            outdir="artifact/bin/${os}/${arch}"
            mkdir -p "$outdir"
            echo "building ${platform}"
            CGO_ENABLED=0 GOOS="$os" GOARCH="$arch" \
              go build -trimpath -o "$outdir/criteria-adapter-copilot" .
          done

      - name: Resolve version
        id: ver
        run: |
          if [ "${{ github.ref_type }}" = "tag" ]; then
            echo "tag=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Publish
        uses: brokenbots/publish-adapter@v0
        with:
          # Directory containing the multi-platform bin/<os>/<arch>/ tree.
          binary: ${{ github.workspace }}/artifact
          registry: ghcr.io/${{ github.repository_owner }}/criteria-adapter-copilot:${{ steps.ver.outputs.tag }}
