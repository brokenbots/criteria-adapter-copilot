name: Publish Adapter

# Build the Go adapter binary, then publish it as a signed OCI artifact via the
# reusable brokenbots/publish-adapter action.

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (without leading v)'
        required: false
        default: '0.0.0-dev'

permissions:
  contents: read
  packages: write
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build adapter binary
        run: |
          mkdir -p bin
          CGO_ENABLED=0 go build -trimpath -o bin/criteria-adapter-copilot .

      - name: Resolve version
        id: ver
        run: |
          if [ "${{ github.ref_type }}" = "tag" ]; then
            echo "tag=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Publish
        uses: brokenbots/publish-adapter@v0
        with:
          binary: ${{ github.workspace }}/bin/criteria-adapter-copilot
          registry: ghcr.io/${{ github.repository_owner }}/criteria-adapter-copilot:${{ steps.ver.outputs.tag }}
